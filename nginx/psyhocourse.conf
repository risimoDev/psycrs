upstream api_backend {
    server 127.0.0.1:4000;
}

upstream web_frontend {
    server 127.0.0.1:3000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name risimobzkdev.ru www.risimobzkdev.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name risimobzkdev.ru www.risimobzkdev.ru;

    # SSL (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/risimobzkdev.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/risimobzkdev.ru/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/vnd.apple.mpegurl;
    gzip_min_length 256;
    gzip_vary on;

    client_max_body_size 500m;

    # ─── API (Fastify :4000) ──────────────────────────────
    location /api/ {
        proxy_pass http://api_backend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ─── Video HLS streaming (X-Accel-Redirect) ────────────
    location /protected/ {
        internal;
        alias /var/storage/videos/;
        add_header Cache-Control "private, max-age=3600";
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "$scheme://$host" always;
        send_timeout 60s;
        sendfile on;
        tcp_nopush on;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    location ~* \.ts$ {
        add_header Cache-Control "public, max-age=604800, immutable" always;
    }
    location ~* \.m3u8$ {
        add_header Cache-Control "public, max-age=5, must-revalidate" always;
    }

    # ─── Static storage (public assets) ───────────────────
    location /storage/ {
        alias /var/storage/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Next.js frontend (:3000) ─────────────────────────
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ─── Next.js static assets ─────────────────────────────
    location /_next/static/ {
        proxy_pass http://web_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. { deny all; return 404; }

    access_log /var/log/nginx/psycrs-access.log;
    error_log  /var/log/nginx/psycrs-error.log warn;
}

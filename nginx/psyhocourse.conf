upstream api_backend {
    server 127.0.0.1:4000;
}

upstream web_frontend {
    server 127.0.0.1:3000;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name psyhocourse.ru www.psyhocourse.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name psyhocourse.ru www.psyhocourse.ru;

    # SSL (Let's Encrypt via Certbot)
    ssl_certificate     /etc/letsencrypt/live/psyhocourse.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/psyhocourse.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (supplement Helmet from API)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript application/vnd.apple.mpegurl;
    gzip_min_length 256;
    gzip_vary on;

    # ─── API ────────────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Webhook needs raw body — increase timeout
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;

        # File upload — 500MB
        client_max_body_size 500m;
    }

    # ─── Video HLS streaming (X-Accel-Redirect) ────────────
    location /protected/ {
        internal;
        alias /var/storage/videos/;
        add_header Cache-Control "private, max-age=3600";
        add_header Access-Control-Allow-Origin "$http_origin";

        # HLS content types
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
    }

    # ─── Static storage (publicly accessible assets) ───────
    location /storage/ {
        alias /var/storage/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Next.js frontend ──────────────────────────────────
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ─── Next.js static assets ─────────────────────────────
    location /_next/static/ {
        proxy_pass http://web_frontend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }
}

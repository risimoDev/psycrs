services:
  # ─── PostgreSQL ──────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: psyhocourse
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── API ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/psyhocourse?schema=public
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      VIDEO_PROVIDER: local
      VIDEO_SIGNING_SECRET: ${VIDEO_SIGNING_SECRET}
      VIDEO_STORAGE_PATH: /var/storage/videos
      STORAGE_PROVIDER: local
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET}
      PAYMENT_RETURN_URL: ${PAYMENT_RETURN_URL:-http://localhost:3000/payment/result}
      SUBSCRIPTION_PRICE: ${SUBSCRIPTION_PRICE:-2990}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-PsyhoCourse <noreply@psyhocourse.ru>}
    volumes:
      - videodata:/var/storage/videos
    ports:
      - "4000:4000"

  # ─── Web (Next.js) ──────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

  # ─── Nginx (reverse proxy) ──────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/psyhocourse.conf:/etc/nginx/conf.d/default.conf:ro
      - videodata:/var/storage/videos:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
    # For first-time setup without SSL, uncomment and use a simpler config

  # ─── Certbot (SSL) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    # Run: docker compose run certbot certonly --webroot -w /var/lib/letsencrypt -d psyhocourse.ru
    entrypoint: "true"

volumes:
  pgdata:
  videodata:
  certbot-etc:
  certbot-var:
